<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Saloon Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

     <style>
        /* Import Google Fonts */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Montserrat:wght@400;500;600;700;800&display=swap');

/* ============================================
   GLOBAL RESET & BASE STYLES
   ============================================ */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background-color: #F8F8F8;        /* Off-white canvas */
  font-family: 'Inter', 'Montserrat', sans-serif;
  line-height: 1.7;
  color: #2E2E2E;                   /* Deep charcoal text */
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2rem;
}

/* ============================================
   LOGIN CARD (White background, rounded, shadow)
   ============================================ */
body > div {
  max-width: 450px;
  width: 100%;
  background: #FFFFFF;
  border-radius: 28px;
  box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05), 0 4px 8px rgba(0, 0, 0, 0.02);
  padding: 2.5rem;
  transition: transform 0.2s ease;
}

/* Header Section */
body > div > div:first-child {
  text-align: center;
  margin-bottom: 2rem;
}

body > div > div:first-child h2 {
  font-size: 2rem;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: #2E2E2E;
  margin-bottom: 0.5rem;
  position: relative;
  display: inline-block;
}

/* Coral underline under Welcome Back */
body > div > div:first-child h2::after {
  content: '';
  position: absolute;
  bottom: -8px;
  left: 50%;
  transform: translateX(-50%);
  width: 60px;
  height: 3px;
  background-color: #FF715B;
  border-radius: 3px;
}

body > div > div:first-child p {
  font-size: 0.9rem;
  color: #5a5a5a;
  margin-top: 0.8rem;
}

/* ============================================
   FORM STYLES
   ============================================ */
form {
  display: flex;
  flex-direction: column;
  gap: 1.2rem;
}

/* Form field groups */
form > div {
  display: flex;
  flex-direction: column;
  gap: 0.4rem;
}

form label {
  font-size: 0.85rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: #2E2E2E;
}

/* Input fields */
form input {
  font-family: 'Inter', 'Montserrat', sans-serif;
  font-size: 0.95rem;
  padding: 0.85rem 1.2rem;
  border: 1px solid #e2e2e2;
  border-radius: 16px;
  background-color: #FFFFFF;
  color: #2E2E2E;
  transition: all 0.2s ease;
  outline: none;
  width: 100%;
}

form input:focus {
  border-color: #FF715B;
  box-shadow: 0 0 0 3px rgba(255, 113, 91, 0.1);
}

form input::placeholder {
  color: #b0b0b0;
  font-weight: 400;
}

/* Login Button - Pill shape, coral, glow */
form button {
  background-color: #FF715B;
  color: #FFFFFF;
  font-family: 'Inter', 'Montserrat', sans-serif;
  font-size: 1rem;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  padding: 0.9rem 1.5rem;
  border: none;
  border-radius: 60px;
  cursor: pointer;
  box-shadow: 0 6px 16px rgba(255, 113, 91, 0.3);
  transition: all 0.2s ease;
  margin-top: 0.5rem;
  width: 100%;
}

form button:hover {
  transform: translateY(-2px);
  background-color: #ff5a42;
  box-shadow: 0 12px 24px rgba(255, 113, 91, 0.4);
}

form button:active {
  transform: translateY(1px);
}

/* ============================================
   MESSAGE (Error / Success)
   ============================================ */
#message {
  margin-top: 1.5rem;
  text-align: center;
  font-size: 0.85rem;
  font-weight: 500;
  color: #FF715B;
  background: rgba(255, 113, 91, 0.08);
  padding: 0.6rem;
  border-radius: 12px;
  display: none;               /* Hidden by default, shown when message exists */
}

#message:not(:empty) {
  display: block;
}

/* ============================================
   RESPONSIVE DESIGN
   ============================================ */
@media (max-width: 550px) {
  body {
    padding: 1rem;
  }
  
  body > div {
    padding: 1.8rem;
  }
  
  body > div > div:first-child h2 {
    font-size: 1.6rem;
  }
  
  form button {
    font-size: 0.9rem;
    padding: 0.75rem 1.2rem;
  }
  
  form input {
    padding: 0.7rem 1rem;
    font-size: 0.9rem;
  }
  
  form label {
    font-size: 0.8rem;
  }
}

/* ============================================
   UTILITY
   ============================================ */
::selection {
  background: rgba(255, 113, 91, 0.2);
  color: #2E2E2E;
}

*:focus-visible {
  outline: 2px solid #FF715B;
  outline-offset: 2px;
}
     </style>
</head>
<body>

    <div >
        <div >
            <h2>Welcome Back</h2>
            <p >Please login to your account</p>
        </div>

        <form id="loginForm" >
            <div>
                <label >Email Address</label>
                <input type="email" id="email" placeholder="admin@example.com" required>
            </div>
            <div>
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••"required>
            </div>
            <button type="submit">Login</button>
        </form>

        <p id="message"></p>
    </div>

<script>
document.getElementById("loginForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const message = document.getElementById("message");

    try {
        const response = await fetch("http://127.0.0.1:8000/api/auth/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                email: email,
                password: password
            })
        });

        const data = await response.json();

        if (!response.ok) {
            message.innerText = data.message || "Login failed";
            return;
        }

        // Save token
        localStorage.setItem("token", data.token);

        // Get role from user
        const role = data.user.role;

        // 🔥 Role-based redirect
        if (role === "admin") {
            window.location.href = "Admin/Html/Admin Dashboard.html";
        } 
        else if (role === "staff") {
            window.location.href = "Staff/Html/Staff Dashboard.html";
        }

    } catch (error) {
        message.innerText = "Something went wrong";
        console.error(error);
    }
});
</script>

</body>
</html>
