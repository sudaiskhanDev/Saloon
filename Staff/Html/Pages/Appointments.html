 <style>
        /* ============================================
   Staff Appointments Page – Premium Styles
   (Nav-bar styles come from external Staff Dashboard.css)
   ============================================ */

/* Import Google Fonts (if not already in external CSS) */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Montserrat:wght@400;500;600;700;800&display=swap');

/* Reset body styles from inline (override basic Arial, background, padding) */
body {
  background-color: #F8F8F8;        /* Off-white canvas */
  font-family: 'Inter', 'Montserrat', sans-serif;
  line-height: 1.7;
  color: #2E2E2E;                   /* Deep charcoal text */
  padding: 0 2rem 3rem 2rem;
  margin: 0;
}

/* Page Heading */
h2 {
  font-size: 2rem;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: #2E2E2E;
  text-align: center;
  margin: 1rem 0 2rem 0;
  position: relative;
}

h2::after {
  content: '';
  position: absolute;
  bottom: -12px;
  left: 50%;
  transform: translateX(-50%);
  width: 80px;
  height: 3px;
  background-color: #FF715B;
  border-radius: 4px;
}

/* Appointments Container */
#appointments {
  max-width: 900px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 1.5rem;
}

/* Appointment Card – Premium white card */
.card {
  background: #FFFFFF;
  border-radius: 24px;
  padding: 1.5rem 2rem;
  box-shadow: 0 12px 28px rgba(0, 0, 0, 0.04), 0 2px 6px rgba(0, 0, 0, 0.02);
  transition: transform 0.2s ease, box-shadow 0.2s ease;
  margin-bottom: 0; /* remove inline margin */
}

.card:hover {
  transform: translateY(-4px);
  box-shadow: 0 20px 35px rgba(0, 0, 0, 0.06);
}

/* Service Name */
.card h3 {
  font-size: 1.4rem;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: #2E2E2E;
  margin-bottom: 0.75rem;
}

/* Appointment details */
.card p {
  font-size: 0.9rem;
  color: #4a4a4a;
  margin: 0.3rem 0;
  line-height: 1.6;
}

/* Status Badges – Pill shape, color-coded */
.status {
  display: inline-block;
  padding: 0.3rem 1.2rem;
  border-radius: 60px;
  font-size: 0.75rem;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: white;
  margin: 0.8rem 0 0.5rem 0;
}

.status.booked {
  background: #FF715B;           /* Coral */
  box-shadow: 0 2px 6px rgba(255, 113, 91, 0.3);
}

.status.completed {
  background: #2e7d32;           /* Deep green */
  box-shadow: 0 2px 6px rgba(46, 125, 50, 0.2);
}

.status.cancelled {
  background: #c62828;           /* Deep red */
  box-shadow: 0 2px 6px rgba(198, 40, 40, 0.2);
}

/* Action Buttons – Pill shape */
.card button {
  font-family: inherit;
  font-size: 0.75rem;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  padding: 0.5rem 1.2rem;
  border: none;
  border-radius: 60px;
  cursor: pointer;
  transition: all 0.2s ease;
  margin-top: 0.8rem;
  margin-right: 0.8rem;
}

/* Mark Completed button (coral) */
.card button:first-of-type {
  background-color: #FF715B;
  color: #FFFFFF;
  box-shadow: 0 3px 8px rgba(255, 113, 91, 0.3);
}

.card button:first-of-type:hover {
  background-color: #ff5a42;
  transform: translateY(-2px);
  box-shadow: 0 6px 12px rgba(255, 113, 91, 0.4);
}

/* Cancel button (red outline → solid red on hover) */
.card button:last-of-type {
  background-color: transparent;
  color: #c62828;
  border: 1.5px solid #ffe0e0;
}

.card button:last-of-type:hover {
  background-color: #c62828;
  color: #FFFFFF;
  border-color: #c62828;
  transform: translateY(-2px);
}

/* Ensure there's no leftover inline styling conflict */
.card button:active {
  transform: translateY(1px);
}

/* Responsive */
@media (max-width: 768px) {
  body {
    padding: 0 1.5rem 2rem 1.5rem;
  }
  
  h2 {
    font-size: 1.6rem;
  }
  
  .card {
    padding: 1.2rem;
  }
  
  .card h3 {
    font-size: 1.2rem;
  }
  
  .card button {
    width: 100%;
    margin-right: 0;
    margin-bottom: 0.5rem;
    text-align: center;
  }
}

@media (max-width: 550px) {
  body {
    padding: 0 1rem 1.5rem 1rem;
  }
  
  h2 {
    font-size: 1.4rem;
  }
  
  .card {
    padding: 1rem;
  }
  
  .status {
    font-size: 0.7rem;
    padding: 0.2rem 1rem;
  }
}

/* Utility */
::selection {
  background: rgba(255, 113, 91, 0.2);
  color: #2E2E2E;
}

*:focus-visible {
  outline: 2px solid #FF715B;
  outline-offset: 2px;
}
    </style>
</head>
<body>
   <!-- Navigation bar – NO inline CSS, relies entirely on external Staff Dashboard.css -->
      <div class="nav-bar">
            <h1>Blush & Bloom Salon</h1>
            <ul>
                <li><a href="../Staff Dashboard.html">Home</a></li>
                <li><a href="./Appointments.html">Appointments</a></li>
                <li><a href="./Services.html">Services</a></li>
            </ul>
        </div>
<h2>My Appointments</h2>

<div id="appointments"></div>

<script>
const token = localStorage.getItem("token"); // JWT token

// 🔥 LOAD APPOINTMENTS
async function loadAppointments() {
    const res = await fetch("http://127.0.0.1:8000/api/staff/appointments", {
        method: "GET",
        headers: {
            "Authorization": "Bearer " + token,
            "Accept": "application/json"
        }
    });

    const data = await res.json();

    let html = "";

    data.appointments.forEach(app => {
        html += `
            <div class="card">
                <h3>${app.service.name}</h3>
                <p>User ID: ${app.user_id}</p>
                <p>Date: ${app.date} | Time: ${app.time}</p>

                <span class="status ${app.status}">
                    ${app.status}
                </span>

                <br>

                <button onclick="markCompleted(${app.appointment_id})">
                    Mark Completed
                </button>

                <button onclick="cancelAppointment(${app.appointment_id})">
                    Cancel
                </button>
            </div>
        `;
    });

    document.getElementById("appointments").innerHTML = html;
}

// 🔥 MARK COMPLETED
async function markCompleted(id) {
    await fetch(`http://127.0.0.1:8000/api/staff/appointment/${id}/complete`, {
        method: "POST",
        headers: {
            "Authorization": "Bearer " + token,
            "Accept": "application/json"
        }
    });

    loadAppointments();
}

// 🔥 CANCEL
async function cancelAppointment(id) {
    await fetch(`http://127.0.0.1:8000/api/staff/appointment/${id}/cancel`, {
        method: "POST",
        headers: {
            "Authorization": "Bearer " + token,
            "Accept": "application/json"
        }
    });

    loadAppointments();
}

// INIT
loadAppointments();
</script>

</body>
</html>
