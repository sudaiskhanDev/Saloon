<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="../../Css/Admin Dashboard.css">
   
    <style>
        /* Import Google Fonts */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Montserrat:wght@400;500;600;700;800&display=swap');

/* ============================================
   GLOBAL RESET & BASE STYLES
   ============================================ */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background-color: #F8F8F8;        /* Off-white canvas */
  font-family: 'Inter', 'Montserrat', sans-serif;
  line-height: 1.7;
  color: #2E2E2E;                   /* Deep charcoal text */
}

/* ============================================
   MAIN DASHBOARD CONTAINER
   ============================================ */
.mian-admin-dashboard {
  max-width: 1400px;
  margin: 0 auto;
  padding: 0 2rem 3rem 2rem;
}

/* ============================================
   DASHBOARD CONTENT AREA
   ============================================ */
.dashboard-content {
  background: transparent;
  margin-top: 1rem;
}

/* ============================================
   SERVICE SECTION
   ============================================ */
.service-section {
  background: transparent;
}

/* Section Heading */
.service-section h2 {
  font-size: 2rem;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: #2E2E2E;
  text-align: center;
  margin: 1rem 0 2rem 0;
  position: relative;
}

.service-section h2::after {
  content: '';
  position: absolute;
  bottom: -12px;
  left: 50%;
  transform: translateX(-50%);
  width: 80px;
  height: 3px;
  background-color: #FF715B;
  border-radius: 4px;
}

/* ============================================
   SERVICE FORM (White card, rounded corners)
   ============================================ */
.service-form {
  background: #FFFFFF;
  border-radius: 24px;
  padding: 2rem;
  box-shadow: 0 12px 28px rgba(0, 0, 0, 0.04), 0 2px 6px rgba(0, 0, 0, 0.02);
  margin-bottom: 2rem;
  display: flex;
  flex-wrap: wrap;
  gap: 1rem;
  align-items: flex-end;
}

.service-form input:not([type="file"]) {
  flex: 1;
  min-width: 160px;
  padding: 0.8rem 1rem;
  font-family: inherit;
  font-size: 0.9rem;
  border: 1px solid #e2e2e2;
  border-radius: 14px;
  background-color: #FFFFFF;
  color: #2E2E2E;
  transition: all 0.2s ease;
  outline: none;
}

.service-form input:focus {
  border-color: #FF715B;
  box-shadow: 0 0 0 3px rgba(255, 113, 91, 0.1);
}

.service-form input::placeholder {
  color: #b0b0b0;
}

/* File input styling */
.service-form input[type="file"] {
  flex: 1;
  min-width: 180px;
  padding: 0.6rem 0.8rem;
  font-family: inherit;
  font-size: 0.85rem;
  border: 1px dashed #e2e2e2;
  border-radius: 14px;
  background-color: #F8F8F8;
  cursor: pointer;
}

.service-form input[type="file"]:hover {
  border-color: #FF715B;
}

/* Save Button - Pill shape, coral, glow */
.service-form button {
  background-color: #FF715B;
  color: #FFFFFF;
  font-family: inherit;
  font-size: 0.9rem;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 1px;
  padding: 0.8rem 2rem;
  border: none;
  border-radius: 60px;
  cursor: pointer;
  box-shadow: 0 4px 12px rgba(255, 113, 91, 0.25);
  transition: all 0.2s ease;
  min-width: 120px;
}

.service-form button:hover {
  transform: translateY(-2px);
  background-color: #ff5a42;
  box-shadow: 0 8px 18px rgba(255, 113, 91, 0.35);
}

.service-form button:active {
  transform: translateY(1px);
}

/* Horizontal rule */
hr {
  margin: 2rem 0;
  border: none;
  height: 1px;
  background: linear-gradient(90deg, transparent, #e0e0e0, transparent);
}

/* ============================================
   SERVICES LIST (Grid layout)
   ============================================ */
#serviceList {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 2rem;
  margin-top: 1rem;
}

/* Individual Service Card */
.service-card {
  background: #FFFFFF;
  border-radius: 20px;
  padding: 1.5rem;
  box-shadow: 0 10px 25px rgba(0, 0, 0, 0.03), 0 2px 4px rgba(0, 0, 0, 0.02);
  transition: transform 0.2s ease, box-shadow 0.2s ease;
  display: flex;
  flex-direction: column;
}

.service-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 15px 30px rgba(0, 0, 0, 0.05);
}

/* Service Image */
.service-card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
  border-radius: 16px;
  margin-bottom: 1rem;
  background-color: #F8F8F8;
}

/* Service Name */
.service-card h3 {
  font-size: 1.3rem;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: #2E2E2E;
  margin-bottom: 0.5rem;
}

/* Description & details */
.service-card p {
  font-size: 0.85rem;
  line-height: 1.6;
  color: #4a4a4a;
  margin: 0.25rem 0;
}

.service-card p:first-of-type {
  font-weight: 500;
  color: #2E2E2E;
}

/* Price and duration highlights */
.service-card p:nth-of-type(2),
.service-card p:nth-of-type(3) {
  font-weight: 600;
  color: #FF715B;
  background: rgba(255, 113, 91, 0.05);
  display: inline-block;
  padding: 0.2rem 0.6rem;
  border-radius: 40px;
  width: fit-content;
  margin-top: 0.3rem;
}

/* Buttons inside card */
.service-card button {
  background-color: transparent;
  border: 1.5px solid #e2e2e2;
  font-family: inherit;
  font-size: 0.75rem;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  padding: 0.5rem 1rem;
  border-radius: 60px;
  cursor: pointer;
  transition: all 0.2s ease;
  margin-top: 0.8rem;
  width: auto;
  display: inline-block;
  margin-right: 0.8rem;
}

.service-card button:first-of-type {
  background-color: #FF715B;
  color: #FFFFFF;
  border: none;
  box-shadow: 0 2px 6px rgba(255, 113, 91, 0.2);
}

.service-card button:first-of-type:hover {
  background-color: #ff5a42;
  transform: translateY(-1px);
}

.service-card button:last-of-type {
  background-color: transparent;
  color: #c62828;
  border-color: #ffe0e0;
}

.service-card button:last-of-type:hover {
  background-color: #c62828;
  color: #FFFFFF;
  border-color: #c62828;
  transform: translateY(-1px);
}

/* ============================================
   RESPONSIVE DESIGN
   ============================================ */
@media (max-width: 768px) {
  .mian-admin-dashboard {
    padding: 0 1rem 2rem 1rem;
  }
  
  .service-section h2 {
    font-size: 1.6rem;
  }
  
  .service-form {
    flex-direction: column;
    align-items: stretch;
    padding: 1.5rem;
  }
  
  .service-form input,
  .service-form input[type="file"],
  .service-form button {
    width: 100%;
  }
  
  #serviceList {
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 1.2rem;
  }
  
  .service-card h3 {
    font-size: 1.1rem;
  }
}

@media (max-width: 550px) {
  .service-section h2 {
    font-size: 1.4rem;
  }
  
  .service-card img {
    height: 150px;
  }
  
  .service-card button {
    font-size: 0.7rem;
    padding: 0.4rem 0.8rem;
  }
}

/* ============================================
   UTILITY
   ============================================ */
::selection {
  background: rgba(255, 113, 91, 0.2);
  color: #2E2E2E;
}

*:focus-visible {
  outline: 2px solid #FF715B;
  outline-offset: 2px;
}
    </style>
    
</head>
<body>
    <div class="mian-admin-dashboard">

        <div class="nav-bar">
            <h1>The Linear</h1>

           <div class="links">
             <ul>
                <li><a href="../Admin Dashboard.html">Home</a></li>
                <li><a href="./Service.html">Service</a></li>
                <li><a href="./Appointment.html">Appointment</a></li>
                <li><a href="./Schedule.html">Schedule</a></li>
                <li><a href="./Staffs.html">Staff</a></li>
                <li><a href="./Feedback.html">Feedback</a></li>
                <li><a href="./Notification.html">Notification</a></li>
            </ul>
           </div>

           
        </div>

        <div class="dashboard-content">

            <div class="service-section">

    <h2>Services Management</h2>

    <!-- CREATE / UPDATE FORM -->
    <div class="service-form">

        <input type="hidden" id="service_id">

        <input type="text" id="name" placeholder="Service Name">
        <input type="text" id="description" placeholder="Description">
        <input type="number" id="price" placeholder="Price">
        <input type="text" id="duration" placeholder="Duration">
        <input type="file" id="image">

        <button onclick="saveService()">Save</button>
    </div>

    <hr>

    <!-- LIST -->
    <div id="serviceList"></div>

</div>
        </div>

    </div>

    <script>
        const API_URL = "http://127.0.0.1:8000/api/services";


// =========================
// LOAD SERVICES
// =========================
function loadServices() {

    fetch(API_URL)
    .then(res => res.json())
    .then(data => {

        let html = "";

        data.forEach(service => {

            let imageUrl = service.image;

            // FIX IMAGE PATH
            if (imageUrl && !imageUrl.startsWith("http")) {
                imageUrl = "http://127.0.0.1:8000/storage/" + imageUrl;
            }

            html += `
                <div class="service-card">

                    <img src="${imageUrl}" width="100">

                    <h3>${service.name}</h3>
                    <p>${service.description || ''}</p>
                    <p>Price: ${service.price}</p>
                    <p>Duration: ${service.duration}</p>

                    <button onclick="editService(
                        ${service.service_id},
                        '${service.name}',
                        '${service.description || ''}',
                        '${service.price}',
                        '${service.duration}'
                    )">Edit</button>

                    <button onclick="deleteService(${service.service_id})">Delete</button>

                </div>
            `;
        });

        document.getElementById("serviceList").innerHTML = html;
    });
}


// =========================
// SAVE (CREATE + UPDATE)
// =========================
function saveService() {

    let id = document.getElementById("service_id").value;

    let formData = new FormData();
    formData.append("name", document.getElementById("name").value);
    formData.append("description", document.getElementById("description").value);
    formData.append("price", document.getElementById("price").value);
    formData.append("duration", document.getElementById("duration").value);

    let image = document.getElementById("image").files[0];
    if (image) {
        formData.append("image", image);
    }

    let url = API_URL;
    if (id) {
        url = `${API_URL}/${id}?_method=PUT`;
    }

    fetch(url, {
        method: "POST",
        body: formData
    })
    .then(res => res.json())
    .then(() => {
        clearForm();
        loadServices();
    });
}


// =========================
// EDIT (fill HTML form)
// =========================
function editService(id, name, description, price, duration) {

    document.getElementById("service_id").value = id;
    document.getElementById("name").value = name;
    document.getElementById("description").value = description;
    document.getElementById("price").value = price;
    document.getElementById("duration").value = duration;
}


// =========================
// DELETE
// =========================
function deleteService(id) {

    fetch(`${API_URL}/${id}`, {
        method: "DELETE"
    })
    .then(() => loadServices());
}


// =========================
// CLEAR FORM
// =========================
function clearForm() {

    document.getElementById("service_id").value = "";
    document.getElementById("name").value = "";
    document.getElementById("description").value = "";
    document.getElementById("price").value = "";
    document.getElementById("duration").value = "";
    document.getElementById("image").value = "";
}


// =========================
// INIT
// =========================
loadServices();
    </script>
</body>
</html>
