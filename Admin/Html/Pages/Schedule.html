<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Staff Status - Admin Dashboard</title>
<link rel="stylesheet" href="../../Css/Admin Dashboard.css">

<style>
    @import url('https://fonts.googleapis.com/css2?family=Lato:wght@300;400;500;700&family=Tenor+Sans&display=swap');

    body {
        background-color: #F9F6F2;
        font-family: 'Lato', sans-serif;
        color: #4A3728;
        margin: 0;
    }

    .nav-bar {
        background: rgba(249, 246, 242, 0.75);
        backdrop-filter: blur(12px);
        border-radius: 80px;
        padding: 14px 40px;
        margin: 32px 20px 40px 20px;
        border: 1px solid rgba(209, 209, 209, 0.5);
        display: flex;
        align-items: center;
        justify-content: space-between;
    }

    .nav-bar h1 {
        font-family: 'Tenor Sans', sans-serif;
        font-size: 1.6rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
    }

    .links ul {
        display: flex;
        gap: 42px;
        list-style: none;
    }

    .links a {
        text-decoration: none;
        color: #4A3728;
        font-weight: 500;
        transition: 0.25s;
    }

    .links a:hover { color: #E2B49A; }

    .dashboard-content {
        max-width: 1200px;
        margin: 0 auto;
        padding: 20px;
        text-align: center;
    }

    h2 {
        font-family: 'Tenor Sans', sans-serif;
        font-size: 2rem;
        margin-bottom: 40px;
        letter-spacing: 0.12em;
    }

    table {
        width: 100%;
        border-collapse: separate;
        border-spacing: 0;
        background: #FFFFFF;
        border-radius: 24px;
        overflow: hidden;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02);
        border: 1px solid #D1D1D1;
    }

    th, td {
        padding: 16px 24px;
        text-align: left;
        border-bottom: 1px solid #F0EDE8;
    }

    th {
        font-family: 'Tenor Sans', sans-serif;
        background-color: #F9F6F2;
        font-weight: 500;
        letter-spacing: 0.08em;
    }

    tr:last-child td { border-bottom: none; }

    .badge {
        padding: 8px 20px;
        border-radius: 50px;
        font-size: 0.75rem;
        font-weight: 700;
        letter-spacing: 0.1em;
        display: inline-block;
    }

    .available { background-color: #e8f5e9; color: #2e7d32; }
    .busy { background-color: #fff3e0; color: #ef6c00; }
    .offline { background-color: #f5f5f5; color: #757575; }
</style>
</head>

<body>

<div class="nav-bar">
    <h1>The Linear</h1>
    <div class="links">
        <ul>
            <li><a href="../Admin Dashboard.html">Home</a></li>
            <li><a href="./Service.html">Service</a></li>
            <li><a href="./Appointment.html">Appointment</a></li>
            <li><a href="./Schedule.html">Schedule</a></li>
            <li><a href="./Feedback.html">Feedback</a></li>
            <li><a href="./Notification.html">Notification</a></li>
        </ul>
    </div>
</div>

<div class="dashboard-content">

    <h2>Staff Availability Status</h2>

    <table>
        <thead>
            <tr>
                <th>Staff ID</th>
                <th>Name</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="staffTableBody"></tbody>
    </table>

</div>

<script>

const API = "http://127.0.0.1:8000/api/staff/status";

// 🔥 LOAD STAFF + STATUS
async function loadDashboard() {

    let res = await fetch(API);
    let response = await res.json();

    let data = response.data;

    let tableBody = document.getElementById("staffTableBody");
    tableBody.innerHTML = "";

    data.forEach(staff => {
        tableBody.innerHTML += `
            <tr>
                <td>${staff.admin_staff_id}</td>
                <td><strong>${staff.name}</strong></td>
                <td>
                    <span class="badge ${staff.status}">
                        ${staff.status.toUpperCase()}
                    </span>
                </td>
            </tr>
        `;
    });
}

loadDashboard();

</script>

</body>
</html>
