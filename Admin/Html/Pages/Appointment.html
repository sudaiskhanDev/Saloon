<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="../../Css/Admin Dashboard.css">

    <style>
        /* Import Google Fonts */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Montserrat:wght@400;500;600;700;800&display=swap');

/* ============================================
   GLOBAL RESET & BASE STYLES
   ============================================ */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background-color: #F8F8F8;        /* Off-white canvas */
  font-family: 'Inter', 'Montserrat', sans-serif;
  line-height: 1.7;
  color: #2E2E2E;                   /* Deep charcoal text */
}

/* ============================================
   MAIN DASHBOARD CONTAINER
   ============================================ */
.mian-admin-dashboard {
  max-width: 1400px;
  margin: 0 auto;
  padding: 0 2rem 3rem 2rem;
}

/* ============================================
   DASHBOARD CONTENT
   ============================================ */
.dashboard-content {
  background: transparent;
  margin-top: 1rem;
}

/* Section Headings */
.dashboard-content h2 {
  font-size: 2rem;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: #2E2E2E;
  text-align: center;
  margin: 1rem 0 2rem 0;
  position: relative;
}

.dashboard-content h2::after {
  content: '';
  position: absolute;
  bottom: -12px;
  left: 50%;
  transform: translateX(-50%);
  width: 80px;
  height: 3px;
  background-color: #FF715B;
  border-radius: 4px;
}

.dashboard-content h3 {
  font-size: 1.3rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: #2E2E2E;
  margin: 1.5rem 0 1rem 0;
}

/* ============================================
   FORM SECTIONS (White cards)
   ============================================ */
.form-section {
  background: #FFFFFF;
  border-radius: 24px;
  padding: 1.8rem;
  box-shadow: 0 12px 28px rgba(0, 0, 0, 0.04), 0 2px 6px rgba(0, 0, 0, 0.02);
  margin-bottom: 2rem;
  display: flex;
  flex-wrap: wrap;
  gap: 1rem;
  align-items: flex-end;
}

.form-section select,
.form-section input {
  flex: 1;
  min-width: 150px;
  padding: 0.8rem 1rem;
  font-family: inherit;
  font-size: 0.9rem;
  border: 1px solid #e2e2e2;
  border-radius: 14px;
  background-color: #FFFFFF;
  color: #2E2E2E;
  transition: all 0.2s ease;
  outline: none;
  cursor: pointer;
}

.form-section select:focus,
.form-section input:focus {
  border-color: #FF715B;
  box-shadow: 0 0 0 3px rgba(255, 113, 91, 0.1);
}

/* Button inside form-section */
.form-section button {
  background-color: #FF715B;
  color: #FFFFFF;
  font-family: inherit;
  font-size: 0.85rem;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 1px;
  padding: 0.8rem 1.8rem;
  border: none;
  border-radius: 60px;
  cursor: pointer;
  box-shadow: 0 4px 12px rgba(255, 113, 91, 0.25);
  transition: all 0.2s ease;
  min-width: 160px;
}

.form-section button:hover {
  transform: translateY(-2px);
  background-color: #ff5a42;
  box-shadow: 0 8px 18px rgba(255, 113, 91, 0.35);
}

.form-section button:active {
  transform: translateY(1px);
}

/* ============================================
   EDIT BOX (White card, hidden by default)
   ============================================ */
#editBox {
  background: #FFFFFF;
  border-radius: 24px;
  padding: 1.8rem;
  box-shadow: 0 12px 28px rgba(0, 0, 0, 0.04);
  margin: 1.5rem 0;
  border: none !important;
}

#editBox h3 {
  margin-top: 0;
  margin-bottom: 1.2rem;
  font-size: 1.3rem;
}

#editBox select,
#editBox input {
  width: calc(33.33% - 1rem);
  min-width: 180px;
  padding: 0.8rem 1rem;
  font-family: inherit;
  font-size: 0.9rem;
  border: 1px solid #e2e2e2;
  border-radius: 14px;
  background-color: #FFFFFF;
  margin-right: 1rem;
  margin-bottom: 1rem;
  transition: all 0.2s ease;
  outline: none;
}

#editBox select:focus,
#editBox input:focus {
  border-color: #FF715B;
  box-shadow: 0 0 0 3px rgba(255, 113, 91, 0.1);
}

#editBox button {
  background-color: #FF715B;
  color: #FFFFFF;
  font-family: inherit;
  font-size: 0.85rem;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 1px;
  padding: 0.7rem 1.5rem;
  border: none;
  border-radius: 60px;
  cursor: pointer;
  transition: all 0.2s ease;
  margin-right: 0.8rem;
}

#editBox button:first-of-type {
  background-color: #FF715B;
  box-shadow: 0 4px 12px rgba(255, 113, 91, 0.25);
}

#editBox button:first-of-type:hover {
  background-color: #ff5a42;
  transform: translateY(-2px);
}

#editBox button:last-of-type {
  background-color: transparent;
  color: #2E2E2E;
  border: 1px solid #e2e2e2;
  box-shadow: none;
}

#editBox button:last-of-type:hover {
  background-color: #f0f0f0;
  transform: translateY(-1px);
}

/* ============================================
   HORIZONTAL RULE
   ============================================ */
hr {
  margin: 2rem 0;
  border: none;
  height: 1px;
  background: linear-gradient(90deg, transparent, #e0e0e0, transparent);
}

/* ============================================
   TABLE STYLES (Clean, modern, premium)
   ============================================ */
table {
  width: 100%;
  border-collapse: collapse;
  background: #FFFFFF;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 8px 20px rgba(0, 0, 0, 0.03);
  margin: 1rem 0 2rem 0;
}

thead tr {
  background: #2E2E2E;
  color: #FFFFFF;
  text-transform: uppercase;
  font-size: 0.8rem;
  font-weight: 700;
  letter-spacing: 0.5px;
}

thead th {
  padding: 1rem 0.8rem;
  text-align: left;
}

tbody tr {
  border-bottom: 1px solid #f0f0f0;
  transition: background 0.2s ease;
}

tbody tr:hover {
  background: #FEF5F2;
}

tbody td {
  padding: 0.9rem 0.8rem;
  font-size: 0.85rem;
  color: #2E2E2E;
  vertical-align: middle;
}

/* Action buttons inside table */
tbody button {
  background-color: transparent;
  border: 1px solid #e2e2e2;
  font-family: inherit;
  font-size: 0.7rem;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  padding: 0.4rem 1rem;
  border-radius: 60px;
  cursor: pointer;
  transition: all 0.2s ease;
  margin-right: 0.5rem;
}

tbody button:first-of-type {
  background-color: #FF715B;
  color: #FFFFFF;
  border: none;
  box-shadow: 0 2px 6px rgba(255, 113, 91, 0.2);
}

tbody button:first-of-type:hover {
  background-color: #ff5a42;
  transform: translateY(-1px);
}

tbody button:last-of-type {
  background-color: transparent;
  color: #c62828;
  border-color: #ffe0e0;
}

tbody button:last-of-type:hover {
  background-color: #c62828;
  color: #FFFFFF;
  border-color: #c62828;
  transform: translateY(-1px);
}

/* ============================================
   RESPONSIVE DESIGN
   ============================================ */
@media (max-width: 1024px) {
  .mian-admin-dashboard {
    padding: 0 1.5rem 2rem 1.5rem;
  }
  
  .form-section {
    flex-direction: column;
    align-items: stretch;
  }
  
  .form-section select,
  .form-section input,
  .form-section button {
    width: 100%;
  }
  
  #editBox select,
  #editBox input {
    width: calc(50% - 0.5rem);
  }
}

@media (max-width: 768px) {
  .dashboard-content h2 {
    font-size: 1.6rem;
  }
  
  .dashboard-content h3 {
    font-size: 1.1rem;
  }
  
  table, thead, tbody, th, td, tr {
    display: block;
  }
  
  thead {
    display: none;
  }
  
  tbody tr {
    margin-bottom: 1rem;
    border: 1px solid #e2e2e2;
    border-radius: 16px;
    padding: 0.8rem;
    background: #FFFFFF;
  }
  
  tbody td {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.5rem 0;
    border-bottom: 1px solid #f0f0f0;
    font-size: 0.85rem;
  }
  
  tbody td:last-child {
    border-bottom: none;
  }
  
  tbody td::before {
    content: attr(data-label);
    font-weight: 800;
    text-transform: uppercase;
    color: #FF715B;
    width: 40%;
  }
  
  /* Manually add data-label attributes via JS or adjust; for now buttons will align */
  tbody td:has(button) {
    justify-content: flex-start;
    gap: 0.5rem;
  }
  
  #editBox select,
  #editBox input {
    width: 100%;
    margin-right: 0;
  }
}

@media (max-width: 550px) {
  .mian-admin-dashboard {
    padding: 0 1rem 1.5rem 1rem;
  }
  
  .dashboard-content h2 {
    font-size: 1.4rem;
  }
  
  .form-section {
    padding: 1.2rem;
  }
  
  #editBox {
    padding: 1.2rem;
  }
}

/* ============================================
   UTILITY
   ============================================ */
::selection {
  background: rgba(255, 113, 91, 0.2);
  color: #2E2E2E;
}

*:focus-visible {
  outline: 2px solid #FF715B;
  outline-offset: 2px;
}
    </style>
   
</head>
<body>
    <div class="mian-admin-dashboard">

        <div class="nav-bar">
            <h1>The Linear</h1>

           <div class="links">
             <ul>
                <li><a href="../Admin Dashboard.html">Home</a></li>
                <li><a href="./Service.html">Service</a></li>
                <li><a href="./Appointment.html">Appointment</a></li>
                <li><a href="./Schedule.html">Schedule</a></li>
                <li><a href="./Staffs.html">Staff</a></li>
                <li><a href="./Feedback.html">Feedback</a></li>
                <li><a href="./Notification.html">Notification</a></li>
            </ul>
           </div>

           
        </div>

  <div class="dashboard-content">

    <h2>Appointments Management</h2>

    <!-- CREATE FORM -->
    <div class="form-section">
        <h3>Create Appointment</h3>

        <select id="user_id"></select>
        <select id="admin_staff_id"></select>
        <select id="service_id"></select>

        <input type="date" id="date">
        <input type="time" id="time">

        <select id="status">
            <option value="booked">Booked</option>
            <option value="cancelled">Cancelled</option>
            <option value="completed">Completed</option>
        </select>

        <button onclick="createAppointment()">Create Appointment</button>
    </div>

    <hr>

    <!-- EDIT FORM -->
    <div id="editBox" style="display:none; border:1px solid #ccc; padding:15px; margin:15px 0;">
        <h3>Edit Appointment</h3>

        <input type="hidden" id="edit_id">

        <select id="edit_user_id"></select>
        <select id="edit_admin_staff_id"></select>
        <select id="edit_service_id"></select>

        <input type="date" id="edit_date">
        <input type="time" id="edit_time">

        <select id="edit_status">
            <option value="booked">Booked</option>
            <option value="cancelled">Cancelled</option>
            <option value="completed">Completed</option>
        </select>

        <button onclick="updateAppointment()">Update</button>
        <button onclick="closeEdit()">Cancel</button>
    </div>

    <hr>

    <!-- TABLE -->
    <h3>All Appointments</h3>

    <table border="1" width="100%">
        <thead>
            <tr>
                <th>ID</th>
                <th>User</th>
                <th>Staff</th>
                <th>Service</th>
                <th>Date</th>
                <th>Time</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="appointmentTable"></tbody>
    </table>

</div>
    </div>

   <script>

const API = "http://127.0.0.1:8000/api/appointments";
const USERS_API = "http://127.0.0.1:8000/api/users";
const STAFF_API = "http://127.0.0.1:8000/api/staff";
const SERVICES_API = "http://127.0.0.1:8000/api/services";

const token = localStorage.getItem("token");

// ⭐ GLOBAL DATA STORE
let usersList = [];
let staffList = [];
let servicesList = [];


// ================= LOAD USERS =================
async function loadUsers() {
    let res = await fetch(USERS_API);
    let data = await res.json();

    usersList = data;

    let select = document.getElementById("user_id");
    let editSelect = document.getElementById("edit_user_id");

    select.innerHTML = "";
    editSelect.innerHTML = "";

    data.forEach(u => {
        let option = `<option value="${u.user_id}">${u.name}</option>`;
        select.innerHTML += option;
        editSelect.innerHTML += option;
    });
}


// ================= LOAD STAFF =================
async function loadStaff() {
    let res = await fetch(STAFF_API);
    let data = await res.json();

    staffList = data;

    let select = document.getElementById("admin_staff_id");
    let editSelect = document.getElementById("edit_admin_staff_id");

    select.innerHTML = "";
    editSelect.innerHTML = "";

    data.forEach(s => {
        let option = `<option value="${s.admin_staff_id}">${s.name}</option>`;
        select.innerHTML += option;
        editSelect.innerHTML += option;
    });
}


// ================= LOAD SERVICES =================
async function loadServices() {
    let res = await fetch(SERVICES_API);
    let data = await res.json();

    servicesList = data;

    let select = document.getElementById("service_id");
    let editSelect = document.getElementById("edit_service_id");

    select.innerHTML = "";
    editSelect.innerHTML = "";

    data.forEach(s => {
        let option = `<option value="${s.service_id}">${s.name}</option>`;
        select.innerHTML += option;
        editSelect.innerHTML += option;
    });
}


// ================= HELPER FUNCTIONS =================
function getUserName(id) {
    let user = usersList.find(u => u.user_id == id);
    return user ? user.name : "N/A";
}

function getStaffName(id) {
    let staff = staffList.find(s => s.admin_staff_id == id);
    return staff ? staff.name : "N/A";
}

function getServiceName(id) {
    let service = servicesList.find(s => s.service_id == id);
    return service ? service.name : "N/A";
}


// ================= LOAD APPOINTMENTS =================
async function loadAppointments() {
    let res = await fetch(API, {
        headers: {
            "Authorization": "Bearer " + token
        }
    });

    let data = await res.json();

    let table = document.getElementById("appointmentTable");
    table.innerHTML = "";

    data.forEach(app => {
        table.innerHTML += `
            <tr>
                <td>${app.appointment_id}</td>
                <td>${getUserName(app.user_id)} (${app.user_id})</td>
                <td>${getStaffName(app.admin_staff_id)} (${app.admin_staff_id})</td>
                <td>${getServiceName(app.service_id)} (${app.service_id})</td>
                <td>${app.date}</td>
                <td>${app.time}</td>
                <td>${app.status}</td>
                <td>
                    <button onclick="editAppointment(${app.appointment_id}, ${app.user_id}, ${app.admin_staff_id}, ${app.service_id}, '${app.date}', '${app.time}', '${app.status}')">Edit</button>
                    <button onclick="deleteAppointment(${app.appointment_id})">Delete</button>
                </td>
            </tr>
        `;
    });
}


// ================= CREATE =================
async function createAppointment() {

    let data = {
        user_id: document.getElementById("user_id").value,
        admin_staff_id: document.getElementById("admin_staff_id").value,
        service_id: document.getElementById("service_id").value,
        date: document.getElementById("date").value,
        time: document.getElementById("time").value,
        status: document.getElementById("status").value
    };

    let res = await fetch(API, {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
        },
        body: JSON.stringify(data)
    });

    if (res.ok) {
        loadAppointments();
    }
}


// ================= EDIT =================
function editAppointment(id, user_id, staff_id, service_id, date, time, status) {

    document.getElementById("editBox").style.display = "block";

    document.getElementById("edit_id").value = id;
    document.getElementById("edit_user_id").value = user_id;
    document.getElementById("edit_admin_staff_id").value = staff_id;
    document.getElementById("edit_service_id").value = service_id;
    document.getElementById("edit_date").value = date;
    document.getElementById("edit_time").value = time;
    document.getElementById("edit_status").value = status;
}


// ================= UPDATE =================
async function updateAppointment() {

    let id = document.getElementById("edit_id").value;

    let data = {
        user_id: document.getElementById("edit_user_id").value,
        admin_staff_id: document.getElementById("edit_admin_staff_id").value,
        service_id: document.getElementById("edit_service_id").value,
        date: document.getElementById("edit_date").value,
        time: document.getElementById("edit_time").value,
        status: document.getElementById("edit_status").value
    };

    let res = await fetch(`${API}/${id}`, {
        method: "PUT",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
        },
        body: JSON.stringify(data)
    });

    if (res.ok) {
        closeEdit();
        loadAppointments();
    }
}


// ================= DELETE =================
async function deleteAppointment(id) {
    let res = await fetch(`${API}/${id}`, {
        method: "DELETE",
        headers: {
            "Authorization": "Bearer " + token
        }
    });

    if (res.ok) {
        loadAppointments();
    }
}


// ================= CLOSE EDIT =================
function closeEdit() {
    document.getElementById("editBox").style.display = "none";
}


// ================= INIT =================
async function init() {
    await loadUsers();
    await loadStaff();
    await loadServices();
    await loadAppointments();
}

init();

</script>
</body>
</html>
