<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="../../Css/Admin Dashboard.css">


<style>
    /* Import Google Fonts */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Montserrat:wght@400;500;600;700;800&display=swap');

/* ============================================
   GLOBAL RESET & BASE STYLES
   ============================================ */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background-color: #F8F8F8;        /* Off-white canvas */
  font-family: 'Inter', 'Montserrat', sans-serif;
  line-height: 1.7;
  color: #2E2E2E;                   /* Deep charcoal text */
}

/* ============================================
   MAIN DASHBOARD CONTAINER
   ============================================ */
.mian-admin-dashboard {
  max-width: 1400px;
  margin: 0 auto;
  padding: 0 2rem 3rem 2rem;
}

/* ============================================
   DASHBOARD CONTENT
   ============================================ */
.dashboard-content {
  background: transparent;
  margin-top: 1rem;
}

/* Headings */
.dashboard-content h2 {
  font-size: 2rem;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: #2E2E2E;
  text-align: center;
  margin: 1rem 0 2rem 0;
  position: relative;
}

.dashboard-content h2::after {
  content: '';
  position: absolute;
  bottom: -12px;
  left: 50%;
  transform: translateX(-50%);
  width: 80px;
  height: 3px;
  background-color: #FF715B;
  border-radius: 4px;
}

.dashboard-content h3 {
  font-size: 1.3rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: #2E2E2E;
  margin: 1.5rem 0 1rem 0;
}

/* ============================================
   FORM SECTION (Create Notification)
   ============================================ */
.form-section {
  background: #FFFFFF;
  border-radius: 24px;
  padding: 1.8rem;
  box-shadow: 0 12px 28px rgba(0, 0, 0, 0.04), 0 2px 6px rgba(0, 0, 0, 0.02);
  margin-bottom: 2rem;
  display: flex;
  flex-wrap: wrap;
  gap: 1rem;
  align-items: flex-end;
}

.form-section select,
.form-section input {
  flex: 1;
  min-width: 160px;
  padding: 0.8rem 1rem;
  font-family: inherit;
  font-size: 0.9rem;
  border: 1px solid #e2e2e2;
  border-radius: 14px;
  background-color: #FFFFFF;
  color: #2E2E2E;
  transition: all 0.2s ease;
  outline: none;
}

.form-section select:focus,
.form-section input:focus {
  border-color: #FF715B;
  box-shadow: 0 0 0 3px rgba(255, 113, 91, 0.1);
}

.form-section button {
  background-color: #FF715B;
  color: #FFFFFF;
  font-family: inherit;
  font-size: 0.85rem;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 1px;
  padding: 0.8rem 1.8rem;
  border: none;
  border-radius: 60px;
  cursor: pointer;
  box-shadow: 0 4px 12px rgba(255, 113, 91, 0.25);
  transition: all 0.2s ease;
  min-width: 140px;
}

.form-section button:hover {
  transform: translateY(-2px);
  background-color: #ff5a42;
  box-shadow: 0 8px 18px rgba(255, 113, 91, 0.35);
}

/* ============================================
   EDIT BOX (Hidden by default)
   ============================================ */
#editBox {
  background: #FFFFFF;
  border-radius: 24px;
  padding: 1.8rem;
  box-shadow: 0 12px 28px rgba(0, 0, 0, 0.04);
  margin: 1.5rem 0;
  display: none;
}

#editBox h3 {
  margin-top: 0;
  margin-bottom: 1.2rem;
}

#editBox select,
#editBox input {
  width: calc(33.33% - 1rem);
  min-width: 180px;
  padding: 0.8rem 1rem;
  font-family: inherit;
  font-size: 0.9rem;
  border: 1px solid #e2e2e2;
  border-radius: 14px;
  background-color: #FFFFFF;
  margin-right: 1rem;
  margin-bottom: 1rem;
  transition: all 0.2s ease;
  outline: none;
}

#editBox select:focus,
#editBox input:focus {
  border-color: #FF715B;
  box-shadow: 0 0 0 3px rgba(255, 113, 91, 0.1);
}

#editBox button {
  background-color: #FF715B;
  color: #FFFFFF;
  font-family: inherit;
  font-size: 0.85rem;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 1px;
  padding: 0.7rem 1.5rem;
  border: none;
  border-radius: 60px;
  cursor: pointer;
  transition: all 0.2s ease;
  margin-right: 0.8rem;
}

#editBox button:first-of-type {
  background-color: #FF715B;
  box-shadow: 0 4px 12px rgba(255, 113, 91, 0.25);
}

#editBox button:first-of-type:hover {
  background-color: #ff5a42;
  transform: translateY(-2px);
}

#editBox button:last-of-type {
  background-color: transparent;
  color: #2E2E2E;
  border: 1px solid #e2e2e2;
  box-shadow: none;
}

#editBox button:last-of-type:hover {
  background-color: #f0f0f0;
  transform: translateY(-1px);
}

/* ============================================
   HORIZONTAL RULE
   ============================================ */
hr {
  margin: 2rem 0;
  border: none;
  height: 1px;
  background: linear-gradient(90deg, transparent, #e0e0e0, transparent);
}

/* ============================================
   TABLE STYLES
   ============================================ */
table {
  width: 100%;
  border-collapse: collapse;
  background: #FFFFFF;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 8px 20px rgba(0, 0, 0, 0.03);
  margin: 1rem 0 2rem 0;
}

thead tr {
  background: #2E2E2E;
  color: #FFFFFF;
  text-transform: uppercase;
  font-size: 0.8rem;
  font-weight: 800;
  letter-spacing: 0.5px;
}

thead th {
  padding: 1rem 0.8rem;
  text-align: left;
}

tbody tr {
  border-bottom: 1px solid #f0f0f0;
  transition: background 0.2s ease;
}

tbody tr:hover {
  background: #FEF5F2;
}

tbody td {
  padding: 0.9rem 0.8rem;
  font-size: 0.85rem;
  color: #2E2E2E;
  vertical-align: middle;
}

/* Status badge inside table (optional, but keep consistent) */
tbody td:nth-child(4) {
  text-transform: uppercase;
  font-weight: 700;
}

/* Action buttons */
tbody button {
  background-color: transparent;
  border: 1px solid #e2e2e2;
  font-family: inherit;
  font-size: 0.7rem;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  padding: 0.4rem 1rem;
  border-radius: 60px;
  cursor: pointer;
  transition: all 0.2s ease;
  margin-right: 0.5rem;
}

tbody button:first-of-type {
  background-color: #FF715B;
  color: #FFFFFF;
  border: none;
  box-shadow: 0 2px 6px rgba(255, 113, 91, 0.2);
}

tbody button:first-of-type:hover {
  background-color: #ff5a42;
  transform: translateY(-1px);
}

tbody button:last-of-type {
  background-color: transparent;
  color: #c62828;
  border-color: #ffe0e0;
}

tbody button:last-of-type:hover {
  background-color: #c62828;
  color: #FFFFFF;
  border-color: #c62828;
  transform: translateY(-1px);
}

/* ============================================
   RESPONSIVE DESIGN
   ============================================ */
@media (max-width: 1024px) {
  .mian-admin-dashboard {
    padding: 0 1.5rem 2rem 1.5rem;
  }
  
  .form-section {
    flex-direction: column;
    align-items: stretch;
  }
  
  .form-section select,
  .form-section input,
  .form-section button {
    width: 100%;
  }
  
  #editBox select,
  #editBox input {
    width: calc(50% - 0.5rem);
  }
}

@media (max-width: 768px) {
  .dashboard-content h2 {
    font-size: 1.6rem;
  }
  
  .dashboard-content h3 {
    font-size: 1.1rem;
  }
  
  /* Responsive table – card style */
  table, thead, tbody, th, td, tr {
    display: block;
  }
  
  thead {
    display: none;
  }
  
  tbody tr {
    margin-bottom: 1rem;
    border: 1px solid #e2e2e2;
    border-radius: 16px;
    padding: 0.8rem;
    background: #FFFFFF;
  }
  
  tbody td {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.5rem 0;
    border-bottom: 1px solid #f0f0f0;
    font-size: 0.85rem;
  }
  
  tbody td:last-child {
    border-bottom: none;
  }
  
  tbody td::before {
    content: attr(data-label);
    font-weight: 800;
    text-transform: uppercase;
    color: #FF715B;
    width: 40%;
  }
  
  /* Fallback labels if no data-label in HTML */
  tbody td:first-child::before {
    content: "ID:";
  }
  tbody td:nth-child(2)::before {
    content: "User:";
  }
  tbody td:nth-child(3)::before {
    content: "Message:";
  }
  tbody td:nth-child(4)::before {
    content: "Status:";
  }
  tbody td:nth-child(5)::before {
    content: "Date:";
  }
  tbody td:nth-child(6)::before {
    content: "Action:";
  }
  
  #editBox select,
  #editBox input {
    width: 100%;
    margin-right: 0;
  }
}

@media (max-width: 550px) {
  .mian-admin-dashboard {
    padding: 0 1rem 1.5rem 1rem;
  }
  
  .dashboard-content h2 {
    font-size: 1.4rem;
  }
  
  .form-section {
    padding: 1.2rem;
  }
  
  #editBox {
    padding: 1.2rem;
  }
}

/* ============================================
   UTILITY
   ============================================ */
::selection {
  background: rgba(255, 113, 91, 0.2);
  color: #2E2E2E;
}

*:focus-visible {
  outline: 2px solid #FF715B;
  outline-offset: 2px;
}
</style>


</head>
<body>
    <div class="mian-admin-dashboard">

        <div class="nav-bar">
            <h1>Blush & Bloom Salon</h1>

           <div class="links">
             <ul>
                <li><a href="../Admin Dashboard.html">Home</a></li>
                <li><a href="./Service.html">Service</a></li>
                <li><a href="./Appointment.html">Appointment</a></li>
                <li><a href="./Schedule.html">Schedule</a></li>
                <li><a href="./Staffs.html">Staff</a></li>
                <li><a href="./Feedback.html">Feedback</a></li>
                <li><a href="./Notification.html">Notification</a></li>
            </ul>
           </div>

           
        </div>

  <div class="dashboard-content">

    <h2>Notification Management</h2>

    <!-- CREATE -->
    <div class="form-section">
        <h3>Create Notification</h3>

        <select id="user_id"></select>

        <input type="text" id="message" placeholder="Message">

        <select id="status">
            <option value="unread">Unread</option>
            <option value="read">Read</option>
        </select>

        <input type="date" id="date">

        <button onclick="createNotification()">Create</button>
    </div>

    <hr>

    <!-- EDIT -->
    <div id="editBox">
        <h3>Edit Notification</h3>

        <input type="hidden" id="edit_id">

        <select id="edit_user_id"></select>

        <input type="text" id="edit_message">

        <select id="edit_status">
            <option value="unread">Unread</option>
            <option value="read">Read</option>
        </select>

        <input type="date" id="edit_date">

        <button onclick="updateNotification()">Update</button>
        <button onclick="closeEdit()">Cancel</button>
    </div>

    <hr>

    <!-- TABLE -->
    <h3>All Notifications</h3>

    <table border="1" width="100%">
        <thead>
            <tr>
                <th>ID</th>
                <th>User</th>
                <th>Message</th>
                <th>Status</th>
                <th>Date</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody id="tableBody"></tbody>
    </table>

</div>
    </div>


  <script>

    const API = "http://127.0.0.1:8000/api/notifications";
const USERS_API = "http://127.0.0.1:8000/api/users";

const token = localStorage.getItem("token");

let usersList = [];

// ================= LOAD USERS =================
async function loadUsers() {
    let res = await fetch(USERS_API);
    let data = await res.json();

    usersList = data;

    let select = document.getElementById("user_id");
    let editSelect = document.getElementById("edit_user_id");

    select.innerHTML = "";
    editSelect.innerHTML = "";

    data.forEach(u => {
        let option = `<option value="${u.user_id}">${u.name}</option>`;
        select.innerHTML += option;
        editSelect.innerHTML += option;
    });
}

// ================= GET USER NAME =================
function getUserName(id) {
    let user = usersList.find(u => u.user_id == id);
    return user ? user.name : "N/A";
}

// ================= LOAD NOTIFICATIONS =================
async function loadNotifications() {

    let res = await fetch(API, {
        headers: {
            "Authorization": "Bearer " + token,
            "Accept": "application/json"
        }
    });

    let data = await res.json();

    let table = document.getElementById("tableBody");
    table.innerHTML = "";

    data.forEach(n => {
        table.innerHTML += `
            <tr>
                <td>${n.notification_id}</td>
                <td>${getUserName(n.user_id)} (${n.user_id})</td>
                <td>${n.message}</td>
                <td>${n.status}</td>
                <td>${n.date}</td>
                <td>
                    <button onclick="editNotification(${n.notification_id}, ${n.user_id}, '${n.message}', '${n.status}', '${n.date}')">Edit</button>
                    <button onclick="deleteNotification(${n.notification_id})">Delete</button>
                </td>
            </tr>
        `;
    });
}

// ================= CREATE =================
async function createNotification() {

    let data = {
        user_id: document.getElementById("user_id").value,
        message: document.getElementById("message").value,
        status: document.getElementById("status").value,
        date: document.getElementById("date").value
    };

    let res = await fetch(API, {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token,
            "Accept": "application/json"
        },
        body: JSON.stringify(data)
    });

    if (res.ok) {
        loadNotifications();
    }
}

// ================= EDIT =================
function editNotification(id, user_id, message, status, date) {

    document.getElementById("editBox").style.display = "block";

    document.getElementById("edit_id").value = id;
    document.getElementById("edit_user_id").value = user_id;
    document.getElementById("edit_message").value = message;
    document.getElementById("edit_status").value = status;
    document.getElementById("edit_date").value = date;
}

// ================= UPDATE =================
async function updateNotification() {

    let id = document.getElementById("edit_id").value;

    let data = {
        user_id: document.getElementById("edit_user_id").value,
        message: document.getElementById("edit_message").value,
        status: document.getElementById("edit_status").value,
        date: document.getElementById("edit_date").value
    };

    let res = await fetch(`${API}/${id}`, {
        method: "PUT",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token,
            "Accept": "application/json"
        },
        body: JSON.stringify(data)
    });

    if (res.ok) {
        closeEdit();
        loadNotifications();
    }
}

// ================= DELETE =================
async function deleteNotification(id) {

    let res = await fetch(`${API}/${id}`, {
        method: "DELETE",
        headers: {
            "Authorization": "Bearer " + token,
            "Accept": "application/json"
        }
    });

    if (res.ok) {
        loadNotifications();
    }
}

// ================= CLOSE EDIT =================
function closeEdit() {
    document.getElementById("editBox").style.display = "none";
}

// ================= INIT =================
async function init() {
    await loadUsers();
    await loadNotifications();
}

init();
  </script>
</body>
</html>
