<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Appointment</title>
<style>
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: #f4f7f6;
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }
    .box {
        background: #fff;
        padding: 40px;
        border-radius: 15px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        width: 100%;
        max-width: 400px;
    }
    h2 {
        text-align: center;
        color: #333;
        margin-bottom: 25px;
    }
    .service-box {
        background: #faf6f2;
        padding: 15px;
        border-radius: 8px;
        border-left: 5px solid #d4a373;
        margin-bottom: 25px;
    }
    .service-box h3 {
        margin: 0 0 5px 0;
        color: #d4a373;
    }
    .service-box p {
        margin: 2px 0;
        font-size: 0.9rem;
        color: #666;
    }
    form {
        display: flex;
        flex-direction: column;
    }
    label {
        margin-bottom: 8px;
        font-weight: 600;
        color: #555;
    }
    input {
        padding: 12px;
        margin-bottom: 20px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 1rem;
        outline: none;
        transition: border-color 0.3s;
    }
    input:focus {
        border-color: #d4a373;
    }
    button {
        background: #d4a373;
        color: white;
        border: none;
        padding: 15px;
        border-radius: 30px;
        font-size: 1rem;
        font-weight: bold;
        cursor: pointer;
        transition: background 0.3s;
    }
    button:hover {
        background: #b88452;
    }
    .back-link {
        display: block;
        text-align: center;
        margin-top: 15px;
        color: #888;
        text-decoration: none;
        font-size: 0.9rem;
    }
</style>
</head>
<body>

<div class="box">

    <h2>Book Appointment</h2>

    <div class="service-box" id="serviceInfo"></div>

    <form id="bookingForm">

        <label>Date</label>
        <input type="date" id="date" required>

        <label>Time</label>
        <input type="time" id="time" required>

        <button type="submit">Confirm Booking</button>
        <a href="Service.html" class="back-link">Cancel and go back</a>
    </form>
</div>

<script>

// =======================
// GET SERVICE
// =======================
let service = JSON.parse(localStorage.getItem("selectedService"));

if (!service) {
    alert("No service selected!");
    window.location.href = "Service.html";
}

// =======================
// SHOW SERVICE INFO (FIXED)
// =======================
document.getElementById("serviceInfo").innerHTML = `
    <h3>${service.name ?? "Service"}</h3>
    <p>Price: Rs. ${service.price ?? 0}</p>
    <p>Duration: ${service.duration_minutes ?? service.duration ?? "N/A"} min</p>
`;

// =======================
// BOOK APPOINTMENT (USER ROUTE)
// =======================
document.getElementById("bookingForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    let date = document.getElementById("date").value;
    let time = document.getElementById("time").value;

    let token = localStorage.getItem("token");

    if (!token) {
        alert("Please login first");
        window.location.href = "login.html";
        return;
    }

    try {

        let response = await fetch("http://127.0.0.1:8000/api/user/appointments", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + token
            },
            body: JSON.stringify({
                service_id: service.service_id ?? service.id,
                date: date,
                time: time
            })
        });

        let data = await response.json();

        if (response.ok) {

            alert("Appointment Booked Successfully");

            // clear selected service
            localStorage.removeItem("selectedService");

            window.location.href = "Service.html";

        } else {
            console.log(data);
            alert(data.message || "Booking Failed");
        }

    } catch (error) {
        console.log(error);
        alert("Server error");
    }
});

</script>

</body>
</html>
