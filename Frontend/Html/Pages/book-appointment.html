<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../../Css/index.css">
<title>Book Appointment</title>
 
<style>
    /* Import Google Fonts */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@400;500;600;700&display=swap');

/* Global Reset & Base Styles (only for this page, nav-bar excluded) */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background-color: #F8F8F8;        /* Off-white canvas */
  font-family: 'Inter', 'Montserrat', sans-serif;
  line-height: 1.7;
  color: #2E2E2E;                   /* Deep charcoal text */
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem;
}

/* Main Booking Card - White background, rounded corners, soft shadow */
.box {
  max-width: 550px;
  width: 100%;
  background: #FFFFFF;
  border-radius: 24px;
  box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05), 0 4px 8px rgba(0, 0, 0, 0.02);
  padding: 2.5rem;
  transition: transform 0.2s ease;
}

/* Heading */
.box h2 {
  font-size: 2rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: #2E2E2E;
  text-align: center;
  margin-bottom: 1.8rem;
  position: relative;
}

/* Coral underline under heading */
.box h2::after {
  content: '';
  position: absolute;
  bottom: -10px;
  left: 50%;
  transform: translateX(-50%);
  width: 70px;
  height: 3px;
  background-color: #FF715B;
  border-radius: 3px;
}

/* Service Info Box (shows selected service details) */
.service-box {
  background: #F8F8F8;
  border-radius: 18px;
  padding: 1.2rem 1.5rem;
  margin-bottom: 2rem;
  text-align: center;
  border: 1px solid #f0f0f0;
}

.service-box h3 {
  font-size: 1.4rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: #2E2E2E;
  margin-bottom: 0.5rem;
}

.service-box p {
  font-size: 0.95rem;
  margin: 0.3rem 0;
  color: #4a4a4a;
}

.service-box p:first-of-type {
  font-weight: 600;
  color: #FF715B;
}

/* Form Styling */
form {
  display: flex;
  flex-direction: column;
  gap: 0.2rem;
}

form label {
  font-size: 0.85rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: #2E2E2E;
  margin-top: 0.8rem;
  margin-bottom: 0.2rem;
}

/* Input Fields - Date & Time */
form input[type="date"],
form input[type="time"] {
  font-family: 'Inter', 'Montserrat', sans-serif;
  font-size: 0.95rem;
  padding: 0.85rem 1rem;
  border: 1px solid #e0e0e0;
  border-radius: 14px;
  background-color: #FFFFFF;
  color: #2E2E2E;
  transition: all 0.25s ease;
  outline: none;
  width: 100%;
}

form input[type="date"]:focus,
form input[type="time"]:focus {
  border-color: #FF715B;
  box-shadow: 0 0 0 3px rgba(255, 113, 91, 0.1);
}

/* Confirm Booking Button - Pill shape, coral, glow */
form button[type="submit"] {
  background-color: #FF715B;
  color: #FFFFFF;
  font-family: 'Inter', 'Montserrat', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  padding: 0.9rem 1.5rem;
  border: none;
  border-radius: 60px;
  cursor: pointer;
  box-shadow: 0 6px 16px rgba(255, 113, 91, 0.3);
  transition: all 0.25s ease;
  margin: 1.5rem 0 1rem 0;
  width: 100%;
}

form button[type="submit"]:hover {
  transform: translateY(-2px);
  background-color: #ff5a42;
  box-shadow: 0 10px 24px rgba(255, 113, 91, 0.4);
}

form button[type="submit"]:active {
  transform: translateY(1px);
}

/* Back Link - Cancel and go back */
.back-link {
  display: inline-block;
  text-align: center;
  font-size: 0.9rem;
  font-weight: 600;
  text-decoration: none;
  color: #2E2E2E;
  background: transparent;
  padding: 0.6rem 1rem;
  border-radius: 40px;
  transition: all 0.2s ease;
  margin-top: 0.5rem;
}

.back-link:hover {
  color: #FF715B;
  background-color: rgba(255, 113, 91, 0.05);
}

/* Responsive Design */
@media (max-width: 550px) {
  body {
    padding: 1rem;
  }
  
  .box {
    padding: 1.5rem;
  }
  
  .box h2 {
    font-size: 1.6rem;
  }
  
  .service-box h3 {
    font-size: 1.2rem;
  }
  
  form button[type="submit"] {
    font-size: 0.9rem;
    padding: 0.75rem 1.2rem;
  }
  
  .back-link {
    font-size: 0.85rem;
  }
}
</style>
 
</head>
<body>
<!-- Navigation Bar -->
        <div class="nav-bar">
            <h1>The Linear</h1>
            <div class="links">
                <ul>
                    <li><a href="../index.html">Home</a></li>
                    <li><a href="./Service.html">Services</a></li>
                    <li><a href="./Notification.html">Notifications</a></li>
                    <li><a href="./Feedback.html">Feedback</a></li>
                </ul>
            </div>
             
        </div>
<div class="box">

    <h2>Book Appointment</h2>

    <div class="service-box" id="serviceInfo"></div>

    <form id="bookingForm">

        <label>Date</label>
        <input type="date" id="date" required>

        <label>Time</label>
        <input type="time" id="time" required>

        <button type="submit">Confirm Booking</button>
        <a href="Service.html" class="back-link">Cancel and go back</a>
    </form>
</div>

<script>

// =======================
// GET SERVICE
// =======================
let service = JSON.parse(localStorage.getItem("selectedService"));

if (!service) {
    alert("No service selected!");
    window.location.href = "Service.html";
}

// =======================
// SHOW SERVICE INFO (FIXED)
// =======================
document.getElementById("serviceInfo").innerHTML = `
    <h3>${service.name ?? "Service"}</h3>
    <p>Price: Rs. ${service.price ?? 0}</p>
    <p>Duration: ${service.duration_minutes ?? service.duration ?? "N/A"} min</p>
`;

// =======================
// BOOK APPOINTMENT (USER ROUTE)
// =======================
document.getElementById("bookingForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    let date = document.getElementById("date").value;
    let time = document.getElementById("time").value;

    let token = localStorage.getItem("token");

    if (!token) {
        alert("Please login first");
        window.location.href = "login.html";
        return;
    }

    try {

        let response = await fetch("http://127.0.0.1:8000/api/user/appointments", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + token
            },
            body: JSON.stringify({
                service_id: service.service_id ?? service.id,
                date: date,
                time: time
            })
        });

        let data = await response.json();

        if (response.ok) {

            alert("Appointment Booked Successfully");

            // clear selected service
            localStorage.removeItem("selectedService");

            window.location.href = "Service.html";

        } else {
            console.log(data);
            alert(data.message || "Booking Failed");
        }

    } catch (error) {
        console.log(error);
        alert("Server error");
    }
});

</script>

</body>
</html>
