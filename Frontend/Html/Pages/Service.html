<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Services</title>

<style>
body { font-family: Arial; background:#f9f9f9; margin:0; }

.nav-bar {
    display:flex;
    justify-content:space-between;
    padding:20px 50px;
    background:#fff;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.nav-bar h1 { margin:0; }

.links ul { display:flex; gap:20px; list-style:none; }

.links a { text-decoration:none; color:#555; font-weight:bold; }

.main-services h1 { text-align:center; margin-top:40px; }

.services-grid {
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(280px,1fr));
    gap:25px;
    padding:40px;
    max-width:1200px;
    margin:auto;
}

.service-card {
    background:#fff;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 4px 15px rgba(0,0,0,0.08);
    transition:0.3s;
    cursor:pointer;
}

.service-card:hover { transform:translateY(-5px); }

.service-image {
    width:100%;
    height:200px;
    object-fit:cover;
}

.card-content { padding:20px; }

.service-name { font-size:1.4rem; margin:0 0 10px; }

.service-description {
    color:#666;
    font-size:0.9rem;
    height:40px;
    overflow:hidden;
}

.card-footer {
    display:flex;
    justify-content:space-between;
    margin-top:15px;
    padding-top:15px;
    border-top:1px solid #eee;
}

.service-price { color:#d4a373; font-weight:bold; }
.service-duration { color:#888; font-size:0.85rem; }

#serviceTemplate { display:none; }
</style>
</head>

<body>

<div class="main-services">

<div class="nav-bar">
    <h1>The Linear</h1>
    <div class="links">
        <ul>
            <li><a href="../index.html">Home</a></li>
            <li><a href="./Service.html">Service</a></li>
        </ul>
    </div>
</div>

<h1>Our Services</h1>

<div class="services-grid" id="servicesContainer">

    <div class="service-card" id="serviceTemplate">
        <img class="service-image" src="">
        <div class="card-content">
            <h2 class="service-name"></h2>
            <p class="service-description"></p>

            <div class="card-footer">
                <span class="service-price"></span>
                <span class="service-duration"></span>
            </div>
        </div>
    </div>

</div>

</div>

<script>
document.addEventListener("DOMContentLoaded", loadServices);

async function loadServices() {

    try {
        const res = await fetch("http://127.0.0.1:8000/api/services");
        const services = await res.json();

        const container = document.getElementById("servicesContainer");
        const template = document.getElementById("serviceTemplate");

        services.forEach(service => {

            const card = template.cloneNode(true);
            card.style.display = "block";
            card.removeAttribute("id");

            card.querySelector(".service-name").textContent = service.name;
            card.querySelector(".service-description").textContent = service.description || "";

            card.querySelector(".service-price").textContent = "Price: " + service.price;

            // ✅ FIX HERE (IMPORTANT)
            card.querySelector(".service-duration").textContent = "Duration: " + service.duration;

            if(service.image){
                card.querySelector(".service-image").src =
                    "http://127.0.0.1:8000/storage/" + service.image;
            }

            card.addEventListener("click", () => {
                window.location.href = `Service-details.html?id=${service.service_id}`;
            });

            container.appendChild(card);
        });

    } catch (err) {
        console.log("Error:", err);
    }
}
</script>

</body>
</html>
