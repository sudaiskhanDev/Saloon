<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Details | The Linear</title>

    <style>
    /* Import Google Fonts */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@400;500;600;700&display=swap');

/* Global Reset & Base Styles */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background-color: #F8F8F8;        /* Off-white canvas */
  font-family: 'Inter', 'Montserrat', sans-serif;
  line-height: 1.7;
  color: #2E2E2E;                   /* Deep charcoal text */
}

/* Navigation Bar (Matches previous designs) */
.nav-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: #FFFFFF;
  padding: 1rem 3rem;
  margin: 2rem 3rem;
  border-radius: 15px;
  box-shadow: 0 8px 20px rgba(0, 0, 0, 0.03), 0 2px 4px rgba(0, 0, 0, 0.02);
  flex-wrap: wrap;
  gap: 1rem;
}

.nav-bar h1 {
  font-size: 1.8rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: -0.5px;
  color: #2E2E2E;
  margin: 0;
  background: linear-gradient(135deg, #2E2E2E 0%, #FF715B 100%);
  background-clip: text;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.links ul {
  display: flex;
  list-style: none;
  gap: 2rem;
  margin: 0;
  padding: 0;
}

.links a {
  text-decoration: none;
  font-size: 0.95rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: #2E2E2E;
  transition: color 0.25s ease;
}

.links a:hover {
  color: #FF715B;
}

/* Main Container */
.container {
  max-width: 900px;
  margin: 0 auto;
  padding: 2rem 40px 5rem 40px;
}

/* Detail Box - White card with rounded corners and soft shadow */
#detailBox {
  background: #FFFFFF;
  border-radius: 24px;
  box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
  padding: 2rem;
  margin-bottom: 2rem;
  transition: transform 0.2s ease;
}

/* Service Name (inside detailBox) */
#detailBox h2 {
  font-size: 2rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: #2E2E2E;
  margin-bottom: 1.5rem;
  text-align: center;
  position: relative;
  padding-bottom: 0.75rem;
}

#detailBox h2::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 70px;
  height: 3px;
  background-color: #FF715B;
  border-radius: 3px;
}

/* Image Box */
.img-box {
  width: 100%;
  margin-bottom: 2rem;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
}

.img-box img {
  width: 100%;
  height: auto;
  max-height: 400px;
  object-fit: cover;
  display: block;
  transition: transform 0.3s ease;
}

.img-box:hover img {
  transform: scale(1.02);
}

/* Info Grid (Price + Duration) */
.info-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 1.5rem;
  margin-bottom: 2rem;
  justify-content: center;
}

.info-box {
  flex: 1;
  min-width: 180px;
  background: #F8F8F8;
  border-radius: 16px;
  padding: 1.2rem;
  text-align: center;
  transition: all 0.2s ease;
}

.info-box b {
  display: block;
  font-size: 0.75rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: #FF715B;
  margin-bottom: 0.5rem;
}

.info-box span {
  display: block;
  font-size: 1.5rem;
  font-weight: 700;
  color: #2E2E2E;
}

/* Description */
.desc {
  font-size: 1rem;
  line-height: 1.7;
  color: #4a4a4a;
  margin-top: 1rem;
  padding-top: 1rem;
  border-top: 1px solid #f0f0f0;
}

/* Book Appointment Button - Pill shape, coral, glow */
#bookBtn {
  display: block;
  width: 100%;
  max-width: 320px;
  margin: 0 auto 1.5rem auto;
  background-color: #FF715B;
  color: #FFFFFF;
  font-family: 'Inter', 'Montserrat', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  padding: 0.9rem 1.8rem;
  border: none;
  border-radius: 60px;
  cursor: pointer;
  box-shadow: 0 6px 16px rgba(255, 113, 91, 0.3);
  transition: all 0.25s ease;
}

#bookBtn:hover {
  transform: translateY(-3px);
  background-color: #ff5a42;
  box-shadow: 0 12px 24px rgba(255, 113, 91, 0.4);
}

#bookBtn:active {
  transform: translateY(1px);
}

/* Back Link */
.back {
  display: inline-block;
  text-align: center;
  font-size: 0.9rem;
  font-weight: 600;
  text-decoration: none;
  color: #2E2E2E;
  background: transparent;
  padding: 0.6rem 1.2rem;
  border-radius: 40px;
  transition: all 0.2s ease;
  margin: 0 auto;
  width: fit-content;
}

.back:hover {
  color: #FF715B;
  background-color: rgba(255, 113, 91, 0.05);
  transform: translateX(-3px);
}

/* Responsive Design */
@media (max-width: 768px) {
  .nav-bar {
    flex-direction: column;
    align-items: flex-start;
    margin: 1rem;
    padding: 1rem;
  }
  
  .links ul {
    gap: 1rem;
  }
  
  .container {
    padding: 1rem 20px 3rem 20px;
  }
  
  #detailBox {
    padding: 1.5rem;
  }
  
  #detailBox h2 {
    font-size: 1.6rem;
  }
  
  .info-box span {
    font-size: 1.2rem;
  }
  
  #bookBtn {
    max-width: 260px;
    font-size: 0.9rem;
    padding: 0.8rem 1.5rem;
  }
}

@media (max-width: 480px) {
  .container {
    padding: 1rem 16px 2rem 16px;
  }
  
  #detailBox {
    padding: 1.2rem;
  }
  
  #detailBox h2 {
    font-size: 1.3rem;
  }
  
  .info-grid {
    flex-direction: column;
    gap: 1rem;
  }
  
  .info-box span {
    font-size: 1.1rem;
  }
  
  .desc {
    font-size: 0.9rem;
  }
}
   </style>
</head>
<body>

<!-- Navigation Bar -->
        <div class="nav-bar">
            <h1>The Linear</h1>
            <div class="links">
                <ul>
                    <li><a href="../index.html">Home</a></li>
                    <li><a href="./Service.html">Services</a></li>
                    <li><a href="./Notification.html">Notifications</a></li>
                    <li><a href="./Feedback.html">Feedback</a></li>
                </ul>
            </div>
             
        </div>

<!-- MAIN -->
<div class="container">

    <div id="detailBox">
        <p>Loading service details...</p>
    </div>

    <button id="bookBtn">Book Appointment</button>

    <a class="back" href="./Service.html">← Back</a>

</div>

<script>

const API = "http://127.0.0.1:8000/api/services/";

let serviceData = null;

// =====================
// GET ID FROM URL
// =====================
const urlParams = new URLSearchParams(window.location.search);
const id = urlParams.get("id");

// =====================
// LOAD SERVICE DETAIL
// =====================
async function loadService() {
    try {

        if (!id) {
            document.getElementById("detailBox").innerHTML =
                "<h3>Invalid Service ID</h3>";
            return;
        }

        const res = await fetch(API + id);
        serviceData = await res.json();

        const img = serviceData.image
            ? "http://127.0.0.1:8000/storage/" + serviceData.image
            : "";

        document.getElementById("detailBox").innerHTML = `
            <h2>${serviceData.name}</h2>

            <div class="img-box">
                <img src="${img}" alt="">
            </div>

            <div class="info-grid">
                <div class="info-box">
                    <b>PRICE</b>
                    <span>Rs ${serviceData.price}</span>
                </div>

                <div class="info-box">
                    <b>DURATION</b>
                    <span>${serviceData.duration ?? "N/A"} mins</span>
                </div>
            </div>

            <div class="desc">
                ${serviceData.description ?? "No description available"}
            </div>
        `;

    } catch (err) {
        console.log("Error:", err);
        document.getElementById("detailBox").innerHTML =
            "<h3>Failed to load service</h3>";
    }
}

loadService();

// =====================
// BOOK BUTTON
// =====================
document.getElementById("bookBtn").addEventListener("click", () => {

    if (!serviceData) {
        alert("Service not loaded yet!");
        return;
    }

    localStorage.setItem("selectedService", JSON.stringify(serviceData));

    window.location.href = "book-appointment.html";
});

</script>

</body>
</html>
