<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Details | The Linear</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f9f9f9;
            margin: 0;
            color: #333;
        }

        .nav-bar {
            display: flex;
            justify-content: space-between;
            padding: 20px 50px;
            background: #fff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .links ul {
            list-style: none;
            display: flex;
            gap: 20px;
        }

        .links a {
            text-decoration: none;
            color: #555;
            font-weight: bold;
        }

        .container {
            max-width: 850px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        .img-box {
            width: 100%;
            height: 380px;
            overflow: hidden;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            background: #faf6f2;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .info-box b {
            color: #d4a373;
            display: block;
            font-size: 13px;
        }

        .info-box span {
            font-size: 18px;
            font-weight: bold;
        }

        .desc {
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        #bookBtn {
            background: #d4a373;
            color: white;
            border: none;
            padding: 14px 35px;
            font-size: 16px;
            border-radius: 30px;
            cursor: pointer;
        }

        #bookBtn:hover {
            background: #b88452;
        }

        .back {
            display: block;
            margin-top: 20px;
            text-align: center;
            color: #777;
            text-decoration: none;
        }
    </style>
</head>
<body>

<!-- NAV -->
<div class="nav-bar">
    <h1>The Linear</h1>
    <div class="links">
        <ul>
            <li><a href="./index.html">Home</a></li>
            <li><a href="./Service.html">Services</a></li>
        </ul>
    </div>
</div>

<!-- MAIN -->
<div class="container">

    <div id="detailBox">
        <p>Loading service details...</p>
    </div>

    <button id="bookBtn">Book Appointment</button>

    <a class="back" href="./Service.html">← Back</a>

</div>

<script>

const API = "http://127.0.0.1:8000/api/services/";

let serviceData = null;

// =====================
// GET ID FROM URL
// =====================
const urlParams = new URLSearchParams(window.location.search);
const id = urlParams.get("id");

// =====================
// LOAD SERVICE DETAIL
// =====================
async function loadService() {
    try {

        if (!id) {
            document.getElementById("detailBox").innerHTML =
                "<h3>Invalid Service ID</h3>";
            return;
        }

        const res = await fetch(API + id);
        serviceData = await res.json();

        const img = serviceData.image
            ? "http://127.0.0.1:8000/storage/" + serviceData.image
            : "";

        document.getElementById("detailBox").innerHTML = `
            <h2>${serviceData.name}</h2>

            <div class="img-box">
                <img src="${img}" alt="">
            </div>

            <div class="info-grid">
                <div class="info-box">
                    <b>PRICE</b>
                    <span>Rs ${serviceData.price}</span>
                </div>

                <div class="info-box">
                    <b>DURATION</b>
                    <span>${serviceData.duration ?? "N/A"} mins</span>
                </div>
            </div>

            <div class="desc">
                ${serviceData.description ?? "No description available"}
            </div>
        `;

    } catch (err) {
        console.log("Error:", err);
        document.getElementById("detailBox").innerHTML =
            "<h3>Failed to load service</h3>";
    }
}

loadService();

// =====================
// BOOK BUTTON
// =====================
document.getElementById("bookBtn").addEventListener("click", () => {

    if (!serviceData) {
        alert("Service not loaded yet!");
        return;
    }

    localStorage.setItem("selectedService", JSON.stringify(serviceData));

    window.location.href = "book-appointment.html";
});

</script>

</body>
</html>
