<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Notifications</title>
<link rel="stylesheet" href="../../Css/index.css">
 
<style>
    /* Import Google Fonts */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@400;500;600;700&display=swap');

/* Global Reset & Base Styles */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background-color: #F8F8F8;        /* Off-white canvas */
  font-family: 'Inter', 'Montserrat', sans-serif;
  line-height: 1.7;
  color: #2E2E2E;                   /* Deep charcoal text */
  padding: 2rem;
  min-height: 100vh;
}

/* Navigation Header - White card style */
.nav {
  max-width: 800px;
  margin: 0 auto 2rem auto;
  background: #FFFFFF;
  border-radius: 20px;
  box-shadow: 0 8px 20px rgba(0, 0, 0, 0.03), 0 2px 4px rgba(0, 0, 0, 0.02);
  padding: 1.2rem 2rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 1rem;
}

.nav h3 {
  font-size: 1.4rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: #2E2E2E;
  margin: 0;
}

/* Unread Count Badge - Coral background, pill shape */
.badge {
  background-color: #FF715B;
  color: #FFFFFF;
  font-family: inherit;
  font-size: 0.9rem;
  font-weight: 700;
  padding: 0.3rem 0.8rem;
  border-radius: 40px;
  box-shadow: 0 2px 8px rgba(255, 113, 91, 0.3);
  display: inline-block;
  min-width: 36px;
  text-align: center;
}

/* Main Container */
.container {
  max-width: 800px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 1rem;
}

/* Notification Card - White background, rounded corners, soft shadow */
.noti-card {
  background: #FFFFFF;
  border-radius: 18px;
  padding: 1.2rem 1.5rem;
  box-shadow: 0 6px 14px rgba(0, 0, 0, 0.03);
  transition: transform 0.2s ease, box-shadow 0.2s ease;
  border-left: 4px solid transparent;
}

.noti-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 12px 24px rgba(0, 0, 0, 0.05);
}

/* Unread status styling - coral left border + subtle background */
.noti-card.unread {
  border-left-color: #FF715B;
  background: linear-gradient(90deg, rgba(255, 113, 91, 0.02) 0%, #FFFFFF 5%);
}

/* Read status - no accent border */
.noti-card.read {
  border-left-color: transparent;
  opacity: 0.85;
}

/* Message text */
.msg {
  font-size: 1rem;
  line-height: 1.7;
  color: #2E2E2E;
  margin-bottom: 0.5rem;
  font-weight: 500;
}

/* Date text - smaller, muted */
.date {
  font-size: 0.75rem;
  color: #b0b0b0;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  font-weight: 500;
}

/* Loading and empty states */
.container > p {
  background: #FFFFFF;
  border-radius: 18px;
  padding: 2rem;
  text-align: center;
  color: #4a4a4a;
  font-size: 0.95rem;
  box-shadow: 0 6px 14px rgba(0, 0, 0, 0.03);
}

/* Responsive Design */
@media (max-width: 600px) {
  body {
    padding: 1rem;
  }
  
  .nav {
    padding: 1rem 1.2rem;
    margin-bottom: 1.5rem;
  }
  
  .nav h3 {
    font-size: 1.2rem;
  }
  
  .badge {
    font-size: 0.8rem;
    padding: 0.2rem 0.7rem;
  }
  
  .noti-card {
    padding: 1rem 1.2rem;
  }
  
  .msg {
    font-size: 0.9rem;
  }
  
  .date {
    font-size: 0.7rem;
  }
}
</style>


</head>

<body>
  <!-- Navigation Bar -->
        <div class="nav-bar">
            <h1>The Linear</h1>
            <div class="links">
                <ul>
                    <li><a href="../index.html">Home</a></li>
                    <li><a href="./Service.html">Services</a></li>
                    <li><a href="./Notification.html">Notifications</a></li>
                    <li><a href="./Feedback.html">Feedback</a></li>
                </ul>
            </div>
             
        </div>
<div class="nav">
    <h3>My Notifications</h3>
    <span class="badge" id="count">0</span>
</div>

<div class="container" id="notificationList">
    Loading notifications...
</div>

<script>

// ======================
// GET TOKEN
// ======================
let token = localStorage.getItem("token");

if (!token) {
    alert("Please login first");
    window.location.href = "login.html";
}

// ======================
// LOAD NOTIFICATIONS
// ======================
async function loadNotifications() {

    try {

        let res = await fetch("http://127.0.0.1:8000/api/user/notifications", {
            method: "GET",
            headers: {
                "Authorization": "Bearer " + token
            }
        });

        let data = await res.json();

        let container = document.getElementById("notificationList");

        if (!data || data.length === 0) {
            container.innerHTML = "<p>No notifications found</p>";
            return;
        }

        let unreadCount = 0;
        let html = "";

        data.forEach(n => {

            if (n.status === "unread") unreadCount++;

            html += `
                <div class="noti-card ${n.status}">
                    <div class="msg">${n.message}</div>
                    <div class="date">${n.date ?? ""}</div>
                </div>
            `;
        });

        container.innerHTML = html;
        document.getElementById("count").innerText = unreadCount;

    } catch (error) {
        console.log(error);
        document.getElementById("notificationList").innerHTML = "Error loading notifications";
    }
}

loadNotifications();

</script>

</body>
</html>
