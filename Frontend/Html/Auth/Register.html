<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
 

    <style>
      /* Import Google Fonts */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@400;500;600;700&display=swap');

/* Global Reset & Base Styles */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background-color: #F8F8F8;        /* Off-white canvas */
  font-family: 'Inter', 'Montserrat', sans-serif;
  line-height: 1.7;
  color: #2E2E2E;                   /* Deep charcoal text */
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2rem;
}

/* Registration Card - White background, rounded corners, soft shadow */
.box {
  max-width: 500px;
  width: 100%;
  background: #FFFFFF;
  border-radius: 20px;              /* Premium rounded corners */
  box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05), 0 4px 8px rgba(0, 0, 0, 0.02);
  padding: 2.5rem;
  transition: transform 0.3s ease;
}

/* Heading - Uppercase, Bold, Deep Charcoal */
.box h2 {
  font-size: 2rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: #2E2E2E;
  text-align: center;
  margin-bottom: 1.5rem;
  position: relative;
}

/* Coral underline under heading */
.box h2::after {
  content: '';
  position: absolute;
  bottom: -10px;
  left: 50%;
  transform: translateX(-50%);
  width: 60px;
  height: 3px;
  background-color: #FF715B;
  border-radius: 3px;
}

/* Error Message Styling */
.error {
  background-color: rgba(255, 113, 91, 0.1);
  color: #FF715B;
  font-size: 0.85rem;
  font-weight: 500;
  padding: 0.6rem 1rem;
  border-radius: 12px;
  margin-bottom: 1.5rem;
  text-align: center;
  display: none;                    /* Hidden by default, shown via JS */
}

.error:not(:empty) {
  display: block;
}

/* Input Fields - Minimalist, Light Border */
.box input {
  width: 100%;
  font-family: 'Inter', 'Montserrat', sans-serif;
  font-size: 0.95rem;
  padding: 0.9rem 1.2rem;
  margin-bottom: 1.25rem;
  border: 1px solid #e0e0e0;
  border-radius: 12px;
  background-color: #FFFFFF;
  color: #2E2E2E;
  transition: all 0.25s ease;
  outline: none;
}

.box input:focus {
  border-color: #FF715B;
  box-shadow: 0 0 0 3px rgba(255, 113, 91, 0.1);
}

.box input::placeholder {
  color: #b0b0b0;
  font-weight: 400;
}

/* Register Button - Pill Shape, Coral, Glow Shadow */
.box button {
  width: 100%;
  background-color: #FF715B;
  color: #FFFFFF;
  font-family: 'Inter', 'Montserrat', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  padding: 0.9rem 1.5rem;
  border: none;
  border-radius: 60px;              /* Pill shape */
  cursor: pointer;
  box-shadow: 0 6px 16px rgba(255, 113, 91, 0.3);
  transition: all 0.25s ease;
  margin-top: 0.5rem;
}

.box button:hover {
  transform: translateY(-2px);
  background-color: #ff5a42;
  box-shadow: 0 10px 24px rgba(255, 113, 91, 0.4);
}

.box button:active {
  transform: translateY(1px);
}

/* Link Section - Login */
.link {
  text-align: center;
  margin-top: 1.8rem;
  font-size: 0.9rem;
  color: #5a5a5a;
}

.link a {
  color: #FF715B;
  text-decoration: none;
  font-weight: 600;
  transition: color 0.2s ease;
}

.link a:hover {
  color: #ff5a42;
  text-decoration: underline;
}

/* Responsive Design */
@media (max-width: 550px) {
  body {
    padding: 1rem;
  }
  
  .box {
    padding: 1.8rem;
  }
  
  .box h2 {
    font-size: 1.6rem;
  }
  
  .box input {
    padding: 0.75rem 1rem;
    font-size: 0.9rem;
  }
  
  .box button {
    padding: 0.75rem 1.2rem;
    font-size: 0.9rem;
  }
}
    </style>


</head>

<body>

<div class="box">
    <h2>Register</h2>

    <p class="error" id="errorMsg"></p>

    <input type="text" id="name" placeholder="Name">
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <input type="text" id="phone" placeholder="Phone (optional)">
    <input type="text" id="address" placeholder="Address (optional)">

    <button onclick="registerUser()">Register</button>

    <div class="link">
        Already have account? <a href="./Login.html">Login</a>
    </div>
</div>

<script>
function registerUser() {

    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const phone = document.getElementById("phone").value;
    const address = document.getElementById("address").value;
    const errorMsg = document.getElementById("errorMsg");

    errorMsg.innerText = "";

    if (!name || !email || !password) {
        errorMsg.innerText = "Name, Email, Password required";
        return;
    }

    fetch("http://127.0.0.1:8000/api/user/register", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Accept": "application/json"
        },
        body: JSON.stringify({
            name: name,
            email: email,
            password: password,
            phone: phone,
            address: address
        })
    })
    .then(res => res.json())
    .then(data => {

        if (data.message === "Account created successfully") {

            // ✅ redirect to login page
            window.location.href = "./Login.html";

        } else {
            errorMsg.innerText = data.message || "Registration failed";
        }

    })
    .catch(err => {
        console.log(err);
        errorMsg.innerText = "Server error";
    });
}
</script>

</body>
</html>
