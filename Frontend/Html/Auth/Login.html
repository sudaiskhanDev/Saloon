<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: 'Inter', sans-serif;
        }

        body{
            background:#f8f8f8;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
        }

        .login-container{
            width:100%;
            max-width:450px;
            background:#fff;
            padding:40px;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,0.08);
        }

        h2{
            text-align:center;
            margin-bottom:25px;
            color:#2E2E2E;
        }

        .role-box{
            display:flex;
            gap:10px;
            margin-bottom:20px;
        }

        .role-box button{
            flex:1;
            padding:12px;
            border:none;
            border-radius:10px;
            cursor:pointer;
            background:#eaeaea;
            font-weight:600;
            transition:0.3s;
        }

        .role-box button.active{
            background:#FF715B;
            color:#fff;
        }

        input{
            width:100%;
            padding:14px;
            margin-bottom:15px;
            border:1px solid #ddd;
            border-radius:10px;
            outline:none;
        }

        input:focus{
            border-color:#FF715B;
        }

        .login-btn{
            width:100%;
            padding:14px;
            border:none;
            border-radius:50px;
            background:#FF715B;
            color:#fff;
            font-size:16px;
            font-weight:700;
            cursor:pointer;
        }

        .login-btn:hover{
            background:#ff5a42;
        }

        .error{
            color:red;
            margin-bottom:15px;
            text-align:center;
        }

        .link{
            text-align:center;
            margin-top:15px;
        }

        .link a{
            color:#FF715B;
            text-decoration:none;
            font-weight:600;
        }

        .back-to-home {
            position: absolute;
            top: 20px;
            left: 20px;
        }

        .back-to-home a {
            text-decoration: none;
            color: #555;
            font-weight: 600;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <div class="back-to-home">
        <a href="../index.html">Back to Home</a>
    </div>
<div class="login-container">

    <h2>Login</h2>

    <div class="role-box">
        <button class="active" id="userBtn">User</button>
        <button id="adminBtn">Admin / Staff</button>
    </div>

    <p class="error" id="errorMsg"></p>

    <input type="email" id="email" placeholder="Enter Email">
    <input type="password" id="password" placeholder="Enter Password">

    <button class="login-btn" onclick="loginUser()">Login</button>

    <div class="link">
        <p>Don't have an account? <a href="./Register.html">Register</a></p>
    </div>

</div>

<script>

let selectedRole = "user";

const userBtn = document.getElementById("userBtn");
const adminBtn = document.getElementById("adminBtn");

userBtn.addEventListener("click", () => {
    selectedRole = "user";

    userBtn.classList.add("active");
    adminBtn.classList.remove("active");
});

adminBtn.addEventListener("click", () => {
    selectedRole = "admin";

    adminBtn.classList.add("active");
    userBtn.classList.remove("active");
});

async function loginUser(){

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const errorMsg = document.getElementById("errorMsg");

    errorMsg.innerText = "";

    if(!email || !password){
        errorMsg.innerText = "Please fill all fields";
        return;
    }

    try{

        // =========================
        // USER LOGIN API
        // =========================
        if(selectedRole === "user"){

            const response = await fetch("http://127.0.0.1:8000/api/user/login",{
                method:"POST",
                headers:{
                    "Content-Type":"application/json",
                    "Accept":"application/json"
                },
                body:JSON.stringify({
                    email:email,
                    password:password
                })
            });

            const data = await response.json();

            if(data.token){

                localStorage.setItem("token", data.token);

                // redirect user
                window.location.href = "../index.html";

            }else{
                errorMsg.innerText = data.message || "User login failed";
            }

        }

        // =========================
        // ADMIN / STAFF LOGIN API
        // =========================
        else if(selectedRole === "admin"){

            const response = await fetch("http://127.0.0.1:8000/api/auth/login",{
                method:"POST",
                headers:{
                    "Content-Type":"application/json",
                    "Accept":"application/json"
                },
                body:JSON.stringify({
                    email:email,
                    password:password
                })
            });

            const data = await response.json();

            if(!response.ok){
                errorMsg.innerText = data.message || "Login failed";
                return;
            }

            localStorage.setItem("token", data.token);

            const role = data.user.role;

            // role based redirect
           if(role === "admin"){
    window.location.href = "../../../Admin/Html/Admin Dashboard.html";
}
else if(role === "staff"){
    window.location.href = "../../../Staff/Html/Staff Dashboard.html";
}
            else{
                errorMsg.innerText = "Invalid role";
            }

        }

    }catch(error){
        console.log(error);
        errorMsg.innerText = "Server error";
    }

}

</script>

</body>
</html>
